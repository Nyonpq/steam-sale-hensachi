name: Update Steam deal data

on:
  schedule:
    # 6時間ごとに実行（UTC基準）。頻度を上げすぎるとActions無料枠を消費するので注意。
    - cron: "0 */6 * * *"
  workflow_dispatch: {} # Actionsタブから手動実行も可能にする

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest Steam deal data
        run: node scripts/fetch-steam-data.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/deals.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: update steam deal data [skip ci]"
          git push
